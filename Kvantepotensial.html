<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/wave_crisp_16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/wave_crisp_32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="../assets/wave_crisp_48x48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="../assets/wave_crisp_96x96.png">
  <link rel="icon" type="image/png" sizes="120x120" href="../assets/wave_crisp_120x120.png">
  <link rel="icon" type="image/png" sizes="144x144" href="../assets/wave_crisp_144x144.png">
  <link rel="icon" type="image/png" sizes="180x180" href="../assets/wave_crisp_180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/wave_crisp_192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/wave_crisp_512x512.png">

  <link rel="apple-touch-icon" sizes="120x120" href="../assets/wave_crisp_120x120.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/wave_crisp_180x180.png">

  <link rel="icon" href="wave_crisp_all_sizes.ico" type="image/x-icon">
  
  <meta charset="utf-8" />
  <title>Nyfiken | Kvantepotensial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="stylesheet.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <a href="../index.html" style="z-index: 4; position: fixed; top: 2rem; left: 2rem;">index</a>


  <div class="controls">

    <div class="group">
      <button id="cameraValues">Print Camera Values</button>
      <button id="printColors">Print Colors</button>
      <button id="printColors">Print Intensities</button>
      <button id="topViewBtn">Top View</button>
    </div>

    <div class="group">
      <label>
        Point Light 1 Intensity
        <input type="range" id="pointIntensity1" min="0" max="2" value="1" step="0.001">
      </label>

      <label>
        Point Light 2 Intensity
        <input type="range" id="pointIntensity2" min="0" max="2" value="1" step="0.001">
      </label>

      <label>
        Point Light 1 Color
        <input id="point1Color" type="color">
      </label>

      <label>
        Point Light 2 Color
        <input id="point2Color" type="color">
      </label>
    </div>

    <div class="group">
      <label>
        Directional Light 1 Intensity
        <input type="range" id="directionalIntensity1" min="0" max="0.5" value="0.15" step="0.001">
      </label>

      <label>
        Directional Light 2 Intensity
        <input type="range" id="directionalIntensity2" min="0" max="0.5" value="0.15" step="0.001">
      </label>

      <label>
        Directional Light 1 Color
        <input id="directionalColor1" type="color">
      </label>

      <label>
        Directional Light 2 Color
        <input id="directionalColor2" type="color">
      </label>
    </div>

  </div>
    <!-- <input type="range" id="IOR" min="0" max="1" step="0.001" value="0"> -->


    <script type="module" src="cameraControls.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
